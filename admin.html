<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración · Portal 4housing</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f5f4f1; --paper:#ffffff; --ink:#20262e; --ink-soft:#5b646e; --ink-faint:#8b939c;
    --line:#dfe2e6; --accent:#235a8f; --accent-soft:#e6eef6; --accent-ink:#12395e;
    --ok:#1a7a45; --ok-soft:#e2f3e9; --warn:#9a5a12; --warn-soft:#f7efe0; --err:#a3372d;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#14181d; --paper:#1b2128; --ink:#e8ebee; --ink-soft:#a4adb6; --ink-faint:#6e7883;
      --line:#2c343d; --accent:#7bafe0; --accent-soft:#1e3349; --accent-ink:#bcdcff;
      --ok:#5fc98d; --ok-soft:#173024; --warn:#e0a352; --warn-soft:#3a2d15; --err:#e0796f;
    }
  }
  *{box-sizing:border-box;margin:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:15px;line-height:1.55;min-height:100vh;}
  .wrap{max-width:980px;margin:0 auto;padding:2rem 1.25rem 4rem;}
  header{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding-bottom:1.25rem;border-bottom:1px solid var(--line);margin-bottom:1.5rem;}
  header[hidden]{display:none;}
  .brand{display:flex;align-items:baseline;gap:.6rem;}
  .brand h1{font-size:1.1rem;font-weight:700;}
  .brand .tag{font-family:var(--mono);font-size:.7rem;color:var(--accent);border:1px solid var(--accent);border-radius:3px;padding:.05rem .4rem;letter-spacing:.06em;}
  .brand a{color:var(--ink-soft);text-decoration:none;font-size:.85rem;}
  .brand a:hover{color:var(--ink);}

  button{font:inherit;cursor:pointer;border-radius:6px;border:1px solid var(--line);background:var(--paper);color:var(--ink);padding:.35rem .8rem;font-size:.85rem;}
  button:hover{border-color:var(--accent);}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
  button:disabled{opacity:.5;cursor:default;}
  select,input[type=text]{font:inherit;font-size:.85rem;padding:.35rem .5rem;border:1px solid var(--line);border-radius:6px;background:var(--paper);color:var(--ink);}
  .msg{color:var(--ink-soft);padding:2.5rem 0;text-align:center;}
  .card-note{background:var(--warn-soft);border:1px solid var(--warn);border-radius:8px;padding:.8rem 1rem;font-size:.85rem;margin-bottom:1.2rem;}

  .usuario{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:1rem 1.2rem;margin-bottom:.9rem;}
  .u-head{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;}
  .u-nombre{font-weight:700;}
  .u-email{font-family:var(--mono);font-size:.78rem;color:var(--ink-soft);}
  .u-flags{margin-left:auto;display:flex;gap:.5rem;align-items:center;}
  .pill{font-family:var(--mono);font-size:.7rem;padding:.15rem .5rem;border-radius:99px;font-weight:700;}
  .pill.on{background:var(--ok-soft);color:var(--ok);}
  .pill.off{background:var(--line);color:var(--ink-faint);}
  .pill.dir{background:var(--accent-soft);color:var(--accent-ink);}
  .sectores{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:.45rem;background:var(--accent-soft);color:var(--accent-ink);border-radius:6px;padding:.25rem .6rem;font-size:.8rem;}
  .chip b{font-family:var(--mono);font-size:.75rem;}
  .chip .vs{font-size:.68rem;background:var(--paper);border-radius:4px;padding:0 .3rem;}
  .chip button{border:none;background:none;color:inherit;padding:0 .1rem;font-size:.9rem;line-height:1;}
  .agregar{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;}
  .estado-linea{font-size:.8rem;margin-top:.5rem;min-height:1.1em;}
  .estado-linea.ok{color:var(--ok);} .estado-linea.err{color:var(--err);}
  .footer-note{font-size:.78rem;color:var(--ink-faint);margin-top:1.5rem;}
</style>
</head>
<body>
<div class="wrap">
  <header id="hdr" hidden>
    <div class="brand"><h1>4housing</h1><span class="tag">ADMIN</span><a href="/portal/">← volver al portal</a></div>
    <div class="brand"><span class="u-email" id="who"></span></div>
  </header>
  <main id="main"><p class="msg">Cargando…</p></main>
</div>

<script>
const SUPABASE_URL = 'https://wcpkpwxhqdcdljfwzcmy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjcGtwd3hocWRjZGxqZnd6Y215Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDM4NDAsImV4cCI6MjA5NjYxOTg0MH0.MSTk46VAwdAsn5qNBdrHmGIiLYyN-rAyAZC72xZW3D4';

const SECTORES = ['fhcomercial','labocomercial','diseno','planificacion','compras','logistica'];
const SECTOR_LBL = { fhcomercial:'Comercial 4H', labocomercial:'LABO', diseno:'Diseño', planificacion:'Planificación', compras:'Compras', logistica:'Logística' };
// Cargos sugeridos por sector (texto libre por convención; estos son los usados hoy)
const CARGOS = {
  fhcomercial: ['miembro'], labocomercial: ['miembro'],
  diseno: ['coordinador','diseno','lectura','admin'],
  planificacion: ['admin','coordinador','pm'],
  compras: ['miembro'], logistica: ['miembro'],
};

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $main = document.getElementById('main');
let USUARIOS = [];

function esc(s){ const d=document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

async function iniciar(){
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/portal/'; return; }
  const { data: yo } = await sb.from('perfiles').select('nombre, es_direccion, activo').eq('id', session.user.id).maybeSingle();
  if (!yo || !yo.activo || !yo.es_direccion) {
    $main.innerHTML = '<p class="msg">Esta pantalla es solo para dirección.<br><a href="/portal/">Volver al portal</a></p>';
    return;
  }
  document.getElementById('hdr').hidden = false;
  document.getElementById('who').textContent = yo.nombre || session.user.email;
  await cargar();
}

async function cargar(){
  // perfiles + sus sectores embebidos (dirección ve todos por RLS)
  const { data, error } = await sb.from('perfiles')
    .select('id, email, nombre, activo, es_direccion, perfiles_sector(sector, cargo, permisos)')
    .order('email');
  if (error) { $main.innerHTML = '<p class="msg">Error: ' + esc(error.message) + '</p>'; return; }
  USUARIOS = data || [];
  render();
}

function render(){
  let h = '<div class="card-note"><b>Alta de usuarios:</b> las cuentas se crean solas con el primer login Microsoft '
        + '(o pre-creándolas en el dashboard de Supabase). Acá se activan y se les asignan sectores y cargos. '
        + 'Los cambios rigen desde la próxima carga de cada app.</div>';
  USUARIOS.forEach(u => { h += tarjetaUsuario(u); });
  $main.innerHTML = h;
}

function tarjetaUsuario(u){
  const sectores = (u.perfiles_sector || []).slice()
    .sort((a,b) => a.sector.localeCompare(b.sector));
  let chips = sectores.map(s => {
    const vs = s.permisos && s.permisos.ve_sueldos === true;
    return '<span class="chip">' + esc(SECTOR_LBL[s.sector] || s.sector) + ' <b>' + esc(s.cargo) + '</b>'
      + (vs ? '<span class="vs" title="ve sueldos">$</span>' : '')
      + (s.sector === 'planificacion'
          ? '<button title="' + (vs ? 'Quitar' : 'Dar') + ' permiso de ver sueldos" onclick="toggleVeSueldos(\'' + u.id + '\', ' + !vs + ')">' + (vs ? '$̶' : '$') + '</button>'
          : '')
      + '<button title="Quitar sector" onclick="quitarSector(\'' + u.id + '\', \'' + s.sector + '\')">✕</button></span>';
  }).join('');

  const usados = sectores.map(s => s.sector);
  const disponibles = SECTORES.filter(s => usados.indexOf(s) < 0);
  const selSector = '<select id="sec-' + u.id + '" onchange="sugerirCargos(\'' + u.id + '\')">'
    + disponibles.map(s => '<option value="' + s + '">' + esc(SECTOR_LBL[s]) + '</option>').join('') + '</select>';
  const agregar = disponibles.length
    ? '<span class="agregar">' + selSector
      + '<input type="text" id="cargo-' + u.id + '" list="cargos-' + u.id + '" placeholder="cargo" size="10" value="' + esc((CARGOS[disponibles[0]]||['miembro'])[0]) + '">'
      + '<datalist id="cargos-' + u.id + '"></datalist>'
      + '<button onclick="agregarSector(\'' + u.id + '\')">+ sector</button></span>'
    : '';

  return '<div class="usuario">'
    + '<div class="u-head">'
    +   '<span class="u-nombre">' + esc(u.nombre || '(sin nombre)') + '</span>'
    +   '<span class="u-email">' + esc(u.email) + '</span>'
    +   '<span class="u-flags">'
    +     (u.es_direccion ? '<span class="pill dir">DIRECCIÓN</span>' : '')
    +     '<span class="pill ' + (u.activo ? 'on' : 'off') + '">' + (u.activo ? 'ACTIVO' : 'INACTIVO') + '</span>'
    +     '<button onclick="toggleActivo(\'' + u.id + '\', ' + !u.activo + ')">' + (u.activo ? 'Desactivar' : 'Activar') + '</button>'
    +   '</span>'
    + '</div>'
    + '<div class="sectores">' + (chips || '<span style="font-size:.8rem;color:var(--ink-faint)">sin sectores</span>') + agregar + '</div>'
    + '<div class="estado-linea" id="est-' + u.id + '"></div>'
    + '</div>';
}

function estado(uid, texto, tipo){
  const el = document.getElementById('est-' + uid);
  if (el) { el.textContent = texto; el.className = 'estado-linea ' + (tipo || ''); }
}

function sugerirCargos(uid){
  const sec = document.getElementById('sec-' + uid).value;
  const dl = document.getElementById('cargos-' + uid);
  const inp = document.getElementById('cargo-' + uid);
  dl.innerHTML = (CARGOS[sec] || []).map(c => '<option value="' + c + '">').join('');
  inp.value = (CARGOS[sec] || ['miembro'])[0];
}

async function toggleActivo(uid, valor){
  const u = USUARIOS.find(x => x.id === uid);
  if (!valor && u && u.es_direccion && !confirm('Estás desactivando a alguien de DIRECCIÓN. ¿Seguro?')) return;
  const { error } = await sb.from('perfiles').update({ activo: valor }).eq('id', uid);
  if (error) return estado(uid, 'Error: ' + error.message, 'err');
  estado(uid, valor ? '✓ Activado.' : '✓ Desactivado (no puede usar ninguna app hasta reactivarlo).', 'ok');
  await cargar();
}

async function agregarSector(uid){
  const sector = document.getElementById('sec-' + uid).value;
  const cargo = (document.getElementById('cargo-' + uid).value || 'miembro').trim();
  const { error } = await sb.from('perfiles_sector')
    .upsert({ perfil_id: uid, sector: sector, cargo: cargo }, { onConflict: 'perfil_id,sector' });
  if (error) return estado(uid, 'Error: ' + error.message, 'err');
  estado(uid, '✓ Sector ' + (SECTOR_LBL[sector] || sector) + ' asignado como ' + cargo + '.', 'ok');
  await cargar();
}

async function quitarSector(uid, sector){
  const u = USUARIOS.find(x => x.id === uid);
  if (!confirm('¿Quitarle ' + (SECTOR_LBL[sector] || sector) + ' a ' + ((u && (u.nombre || u.email)) || 'este usuario') + '? Deja de ver ese módulo al instante.')) return;
  const { error } = await sb.from('perfiles_sector').delete()
    .eq('perfil_id', uid).eq('sector', sector);
  if (error) return estado(uid, 'Error: ' + error.message, 'err');
  estado(uid, '✓ Sector quitado.', 'ok');
  await cargar();
}

async function toggleVeSueldos(uid, valor){
  const u = USUARIOS.find(x => x.id === uid);
  const fila = u && (u.perfiles_sector || []).find(s => s.sector === 'planificacion');
  if (!fila) return;
  const permisos = Object.assign({}, fila.permisos || {}, { ve_sueldos: valor });
  const { error } = await sb.from('perfiles_sector').update({ permisos: permisos })
    .eq('perfil_id', uid).eq('sector', 'planificacion');
  if (error) return estado(uid, 'Error: ' + error.message, 'err');
  estado(uid, valor ? '✓ Ahora ve sueldos en Planificación.' : '✓ Ya no ve sueldos.', 'ok');
  await cargar();
}

iniciar();
</script>
</body>
</html>
